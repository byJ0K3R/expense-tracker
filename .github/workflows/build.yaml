name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer \
            android debug

      - uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: bin/*.apk
          retention-days: 7
          if-no-files-found: warn
