name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer==1.5.0 cython==0.29.33
      - name: Build APK
        run: |
          export CFLAGS="-Wno-error"
          export NDKVER=25b
          yes | buildozer android debug 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: bin/*.apk
          retention-days: 7
          if-no-files-found: warn
